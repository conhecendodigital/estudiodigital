<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Sora:wght@400;600;700;800&amp;family=Instrument+Serif&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b61ff",
                        "background-light": "#f6f5f8",
                        "background-dark": "#0a0a14",
                        "sidebar-dark": "#18181b",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "sora": ["Sora", "sans-serif"],
                        "serif": ["Instrument Serif", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .noise-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.035;
            pointer-events: none;
        }
        .plasma-glow {
            box-shadow: 0 0 40px -10px rgba(123, 97, 255, 0.5);
        }
        .hero-glow {
            background: radial-gradient(circle at center, rgba(123, 97, 255, 0.15) 0%, transparent 70%);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden">
<div class="fixed inset-0 noise-overlay z-50"></div>
<div class="flex h-screen w-full relative z-10">
<!-- Sidebar -->
<aside class="w-80 bg-sidebar-dark border-r border-white/5 flex flex-col p-8 hidden lg:flex">
<div class="flex items-center gap-3 mb-12">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">key</span>
</div>
<h2 class="text-xl font-bold tracking-tight">chave.ai</h2>
</div>
<nav class="space-y-6">
<div class="flex flex-col gap-2">
<p class="text-xs font-semibold text-white/30 uppercase tracking-widest px-2">Progresso</p>
<div class="flex items-center gap-3 p-3 rounded-xl bg-primary/10 border border-primary/20 text-primary">
<span class="material-symbols-outlined">emoji_events</span>
<span class="font-medium">Conquistas</span>
</div>
</div>
</nav>
<div class="mt-auto p-6 rounded-2xl bg-white/5 border border-white/10">
<p class="text-sm text-white/60 leading-relaxed italic">
                    "O sucesso deixa rastros. Compartilhe suas vitórias para personalizarmos sua jornada."
                </p>
</div>
</aside>
<!-- Main Content -->
<main class="flex-1 flex flex-col relative overflow-y-auto">
<!-- Top Nav -->
<nav class="w-full px-12 py-8 flex items-center justify-between">
<button class="flex items-center gap-2 text-white/60 hover:text-white transition-colors font-medium">
<span class="material-symbols-outlined">arrow_back</span>
                    Voltar
                </button>
<div class="flex flex-col items-end gap-2 max-w-xs w-full">
<div class="flex justify-between w-full text-xs font-semibold uppercase tracking-wider text-white/40">
<span>Passo 4 de 13</span>
<span class="text-primary">30%</span>
</div>
<div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full plasma-glow" style="width: 30%"></div>
</div>
</div>
</nav>
<!-- Hero Section -->
<div class="flex-1 flex flex-col items-center justify-center px-6 max-w-4xl mx-auto w-full pb-24">
<div class="relative mb-12">
<div class="absolute inset-0 hero-glow scale-150"></div>
<div class="relative size-32 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30 shadow-[0_0_50px_-12px_rgba(123,97,255,0.4)]">
<span class="material-symbols-outlined text-6xl text-primary" style="font-variation-settings: 'FILL' 1">emoji_events</span>
</div>
</div>
<div class="text-center space-y-4 mb-12">
<h1 class="text-5xl font-sora font-bold tracking-tight dark:text-white">
                        Qual resultado você já conquistou?
                    </h1>
<p class="text-xl text-white/50 max-w-xl mx-auto font-light leading-relaxed">
                        Ex: Ganhei 10k seguidores, Vendi R$50k, Emagreci 20kg...
                    </p>
</div>
<!-- Input Area -->
<div class="w-full max-w-2xl space-y-8">
<div class="relative group">
<input class="w-full h-24 glass-input rounded-lg px-8 text-2xl font-medium focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-white/10 text-white text-center" placeholder="Digite sua maior conquista aqui..." type="text"/>
<div class="absolute -bottom-6 left-1/2 -translate-x-1/2 flex gap-2">
<span class="h-1 w-8 rounded-full bg-primary/40"></span>
<span class="h-1 w-12 rounded-full bg-primary"></span>
<span class="h-1 w-8 rounded-full bg-primary/40"></span>
</div>
</div>
<div class="flex justify-center pt-8">
<button class="bg-primary hover:bg-primary/90 text-white px-12 py-5 rounded-full font-bold text-lg flex items-center gap-3 transition-all transform hover:scale-105 plasma-glow group">
                            Continuar
                            <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-primary/5 blur-[120px] -z-10 rounded-full"></div>
<div class="absolute top-0 left-0 w-[300px] h-[300px] bg-primary/5 blur-[100px] -z-10 rounded-full"></div>
</main>
</div>
<!-- Decorative Image Component Integration (Example usage of components list style) -->
<div class="hidden">
<img data-alt="Abstract deep purple and black gradient with mesh texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCO6zMj75oZ4O9y3Fc601z6ly349-d6kAPWlEVK72CNG-6HO2Ss_GZnsCgqy6nfU5Vj3xcb8cXeDJ3j9QdAbYpMBoZLfty5Z6UxlMKL6-hCnCiW0_pk8xq8wl8X103BToSWuGUjSODBHRa11a5Iz2kft68wE_265pHZuxMLZPzKfIQmEUCt-VgCb4jtHubrf-oxZKTHMRk-vwcH1AOStqXFbJEt-p9rzirMcrLO1qDlV6qH-kSpS6y4bdm-rtHehQX19cY8xflLJLw"/>
</div>
</body></html>
