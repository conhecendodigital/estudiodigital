<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Sora:wght@400;600;700;800&amp;family=Instrument+Serif&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b61ff",
                        "background-light": "#f6f5f8",
                        "background-dark": "#0A0A14",
                        "sidebar-dark": "#18181B",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "sora": ["Sora", "sans-serif"],
                        "serif": ["Instrument Serif", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.035;
            z-index: 50;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .glow-effect {
            box-shadow: 0 0 40px 10px rgba(123, 97, 255, 0.15);
        }
        .plasma-glow {
            box-shadow: 0 0 20px 2px rgba(123, 97, 255, 0.4);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(123, 97, 255, 0.2);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="noise-overlay"></div>
<div class="flex h-screen w-full">
<!-- Sidebar -->
<aside class="w-80 bg-sidebar-dark border-r border-white/5 flex flex-col p-8 z-10">
<div class="flex items-center gap-3 mb-12">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-xl">key</span>
</div>
<h2 class="font-sora font-bold text-xl tracking-tight">chave.ai</h2>
</div>
<nav class="space-y-6">
<div class="space-y-2">
<p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold px-2">Configuração</p>
<div class="flex items-center gap-3 p-3 bg-primary/10 text-primary rounded-xl">
<span class="material-symbols-outlined">person_pin</span>
<span class="font-medium">Perfil &amp; Nicho</span>
</div>
<div class="flex items-center gap-3 p-3 text-slate-500 rounded-xl opacity-50">
<span class="material-symbols-outlined">brush</span>
<span class="font-medium">Identidade</span>
</div>
<div class="flex items-center gap-3 p-3 text-slate-500 rounded-xl opacity-50">
<span class="material-symbols-outlined">hub</span>
<span class="font-medium">Integrações</span>
</div>
</div>
</nav>
<div class="mt-auto p-4 bg-white/5 rounded-2xl border border-white/5">
<p class="text-xs text-slate-400 mb-2">Seu progresso</p>
<div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-primary plasma-glow" style="width: 7.7%"></div>
</div>
<p class="text-[10px] text-primary mt-2 font-bold uppercase tracking-wider">Etapa 1 de 13</p>
</div>
</aside>
<!-- Main Content -->
<main class="flex-1 flex flex-col relative overflow-y-auto">
<!-- Top Nav -->
<header class="h-20 flex items-center justify-between px-12 border-b border-white/5 backdrop-blur-sm sticky top-0 z-20">
<button class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors group">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="text-sm font-medium">Voltar</span>
</button>
<div class="flex items-center gap-4">
<div class="flex flex-col items-end">
<span class="text-[10px] text-slate-500 uppercase tracking-tighter font-bold leading-none">Status</span>
<span class="text-sm font-sora font-semibold">Configuração Inicial</span>
</div>
<div class="h-10 w-10 rounded-full bg-primary flex items-center justify-center text-white font-bold text-xs plasma-glow">
                        1/13
                    </div>
</div>
</header>
<!-- Onboarding Body -->
<section class="flex-1 flex flex-col items-center justify-center px-4 max-w-4xl mx-auto w-full pb-20">
<!-- Hero Icon -->
<div class="relative mb-12">
<div class="absolute inset-0 bg-primary blur-[80px] opacity-20 rounded-full"></div>
<div class="relative size-32 bg-white/5 rounded-full flex items-center justify-center border border-white/10 glow-effect">
<span class="text-6xl drop-shadow-[0_0_15px_rgba(123,97,255,0.8)]">🎯</span>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-4 mb-12">
<h1 class="text-4xl md:text-5xl font-sora font-bold text-white tracking-tight">
                        Qual é o seu <span class="text-primary">nicho</span> ou área de atuação?
                    </h1>
<p class="text-lg text-slate-300/50 font-display">
                        Ex: Marketing Digital, Finanças, Saúde, Beleza...
                    </p>
</div>
<!-- Input Field -->
<div class="w-full max-w-2xl relative group">
<input class="w-full h-20 px-8 text-xl font-display text-white glass-input rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-600" placeholder="Digite sua especialidade..." type="text"/>
<div class="absolute inset-y-0 right-6 flex items-center pointer-events-none text-slate-600 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">edit_note</span>
</div>
</div>
<!-- Action Button -->
<div class="mt-16">
<button class="px-12 py-5 bg-primary text-white rounded-full font-sora font-bold text-lg flex items-center gap-3 plasma-glow hover:scale-105 active:scale-95 transition-all group">
                        Continuar
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</section>
<!-- Decorative Elements -->
<div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-primary/10 blur-[120px] rounded-full pointer-events-none -mb-64 -mr-64"></div>
<div class="absolute top-0 left-0 w-[300px] h-[300px] bg-primary/5 blur-[100px] rounded-full pointer-events-none -mt-32 -ml-32"></div>
</main>
</div>
</body></html>
