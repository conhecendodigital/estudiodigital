<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Sora:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b61ff",
                        "background-light": "#f6f5f8",
                        "background-dark": "#0a0a14",
                        "panel-dark": "#18181b",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "sora": ["Sora", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>.noise-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    content: "";
    opacity: 0.035;
    z-index: 50;
    pointer-events: none;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCm2pbc6QGXUki3TEZkA8nO8aCa88Pg9Nl1x5YXlJwQk6VN0lVJQikLgDENMXrff4ruNgzyCVS5RcubJyBHw_sLWm1ertUx3a9mNbYIVY4B-Rj9i-eKYROBSrDdRRD_rAo4Fc-UR-MUdTGiaFr2Lvinb6bBQIyVxc_O2SnKAiKQ4t7NpZDaqo4yGq-85OW2jdmydmX-weOj4Z-5U4ptdbm-f5L0yHc_Q15VPRZ_OJGA8XJ1I0Dhlqm-OQmTr147H-mFIJ96diWiLZU)
    }
.plasma-glow {
    box-shadow: 0 0 40px -10px rgba(123, 97, 255, 0.4)
    }
.plasma-border-active {
    border: 2px solid #7b61ff;
    box-shadow: 0 0 20px rgba(123, 97, 255, 0.3)
    }</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen overflow-x-hidden">
<div class="noise-overlay"></div>
<div class="flex min-h-screen">
<!-- Side Navigation Bar -->
<aside class="w-72 bg-panel-dark border-r border-primary/10 flex flex-col h-screen sticky top-0 z-40">
<div class="p-8 flex flex-col h-full">
<!-- Logo -->
<div class="flex items-center gap-3 mb-10">
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary">key</span>
</div>
<div class="flex flex-col">
<h1 class="text-slate-100 text-lg font-bold leading-none">chave.ai</h1>
<p class="text-primary/60 text-xs font-medium uppercase tracking-wider">Ecossistema</p>
</div>
</div>
<!-- Nav Links -->
<nav class="flex flex-col gap-2 flex-1">
<a class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">grid_view</span>
<span class="text-slate-300 font-medium">Dashboard</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/10 border border-primary/20 text-primary" href="#">
<span class="material-symbols-outlined">hub</span>
<span class="font-medium">Ecossistema</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">auto_fix_high</span>
<span class="text-slate-300 font-medium">Automação</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">description</span>
<span class="text-slate-300 font-medium">Conteúdo</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">settings</span>
<span class="text-slate-300 font-medium">Configurações</span>
</a>
</nav>
<!-- Footer Progress Sidebar -->
<div class="mt-auto pt-6 border-t border-white/5">
<div class="flex flex-col gap-3">
<div class="flex justify-between items-end">
<p class="text-slate-100 text-sm font-medium">Passo 11 de 13</p>
<p class="text-primary text-xs font-bold">85%</p>
</div>
<div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full shadow-[0_0_10px_#7b61ff]" style="width: 85%;"></div>
</div>
<p class="text-slate-400 text-[10px] uppercase tracking-widest mt-1">Disponibilidade</p>
</div>
</div>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col relative overflow-y-auto">
<!-- Top Nav -->
<header class="p-8 flex items-center justify-between">
<button class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors group">
<span class="material-symbols-outlined text-xl group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="font-medium">Voltar</span>
</button>
</header>
<!-- Onboarding Content -->
<div class="flex-1 flex flex-col items-center justify-center max-w-4xl mx-auto w-full px-8 pb-20">
<!-- Hero Icon -->
<div class="relative mb-8">
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full"></div>
<div class="relative size-24 rounded-full bg-primary/10 border border-primary/30 flex items-center justify-center plasma-glow">
<span class="material-symbols-outlined text-5xl text-primary leading-none" style="font-variation-settings: 'FILL' 1">schedule</span>
</div>
</div>
<!-- Title & Subtitle -->
<div class="text-center mb-12">
<h2 class="text-4xl md:text-5xl font-sora font-bold text-white mb-4 tracking-tight">
                        Quanto tempo por dia pode dedicar?
                    </h2>
<p class="text-[#f0eff4]/50 text-lg max-w-xl mx-auto font-display">
                        Seja honesta — isso vai definir seu ritmo de publicação dentro do ecossistema.
                    </p>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full mb-12">
<!-- Card 1 -->
<button class="group relative flex items-center p-8 bg-panel-dark rounded-lg border border-white/5 hover:border-primary/50 transition-all text-left">
<div class="flex-1">
<h3 class="text-white text-xl font-sora font-semibold">30 minutos</h3>
<p class="text-slate-500 text-sm mt-1">Foco em agilidade e essencial.</p>
</div>
<div class="size-6 rounded-full border-2 border-white/10 group-hover:border-primary transition-colors flex items-center justify-center">
<div class="size-3 rounded-full bg-primary scale-0 group-hover:scale-100 transition-transform"></div>
</div>
</button>
<!-- Card 2 (Active State Example) -->
<button class="group relative flex items-center p-8 bg-panel-dark rounded-lg plasma-border-active transition-all text-left">
<div class="flex-1">
<h3 class="text-white text-xl font-sora font-semibold">1 hora</h3>
<p class="text-slate-500 text-sm mt-1">Equilíbrio ideal para crescimento.</p>
</div>
<div class="size-6 rounded-full border-2 border-primary flex items-center justify-center">
<div class="size-3 rounded-full bg-primary scale-100"></div>
</div>
</button>
<!-- Card 3 -->
<button class="group relative flex items-center p-8 bg-panel-dark rounded-lg border border-white/5 hover:border-primary/50 transition-all text-left">
<div class="flex-1">
<h3 class="text-white text-xl font-sora font-semibold">2 horas</h3>
<p class="text-slate-500 text-sm mt-1">Aceleração máxima de resultados.</p>
</div>
<div class="size-6 rounded-full border-2 border-white/10 group-hover:border-primary transition-colors flex items-center justify-center">
<div class="size-3 rounded-full bg-primary scale-0 group-hover:scale-100 transition-transform"></div>
</div>
</button>
<!-- Card 4 -->
<button class="group relative flex items-center p-8 bg-panel-dark rounded-lg border border-white/5 hover:border-primary/50 transition-all text-left">
<div class="flex-1">
<h3 class="text-white text-xl font-sora font-semibold">Mais de 2 horas</h3>
<p class="text-slate-500 text-sm mt-1">Dominação total do mercado.</p>
</div>
<div class="size-6 rounded-full border-2 border-white/10 group-hover:border-primary transition-colors flex items-center justify-center">
<div class="size-3 rounded-full bg-primary scale-0 group-hover:scale-100 transition-transform"></div>
</div>
</button>
</div>
<!-- Action Button -->
<button class="w-full max-w-md py-5 bg-primary hover:bg-primary/90 text-white font-sora font-bold text-lg rounded-xl shadow-[0_10px_30px_-10px_rgba(123,97,255,0.5)] flex items-center justify-center gap-3 transition-all hover:scale-[1.02] active:scale-[0.98]">
                    Continuar
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Background Visuals -->
<div class="absolute bottom-0 right-0 w-full h-[500px] pointer-events-none overflow-hidden -z-10 opacity-30">
<div class="absolute -bottom-20 -right-20 w-[600px] h-[600px] bg-primary/20 blur-[120px] rounded-full"></div>
</div>
</main>
</div>
</body></html>
