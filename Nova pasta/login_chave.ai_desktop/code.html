<h2 class="text-white text-3xl font-bold leading-tight tracking-[-0.04em] font-display">
                    chave<span class="text-primary">.</span>ai
                </h2>

<!-- Central Card -->
<main class="w-full max-w-[480px]">
<div class="glass-card rounded-lg p-10 shadow-2xl border border-plasma-purple/30">
<h1 class="text-white font-serif italic text-[40px] leading-tight text-center mb-10">
                    Bem-vindo ao sistema.
                </h1>
<form class="space-y-6">
<!-- Email Field -->
<div class="relative group">
<label class="block font-sora text-sm font-medium text-slate-400 mb-2 transition-colors group-focus-within:text-primary" for="email">
                            Email
                        </label>
<input class="w-full bg-slate-900/50 border border-slate-700/50 focus:border-primary focus:ring-1 focus:ring-primary/20 rounded-xl px-5 py-4 text-white font-sora placeholder:text-slate-600 transition-all outline-none" id="email" name="email" placeholder="usuario@email.com.br" type="email"/>
</div>
<!-- Password Field -->
<div class="relative group">
<div class="flex justify-between items-center mb-2">
<label class="block font-sora text-sm font-medium text-slate-400 transition-colors group-focus-within:text-primary" for="password">
                                Senha
                            </label>
<a class="text-xs font-sora text-slate-500 hover:text-ghost-white transition-colors hover:underline underline-offset-4" href="#">
                                Esqueci minha senha
                            </a>
</div>
<div class="relative flex items-center">
<input class="w-full bg-slate-900/50 border border-slate-700/50 focus:border-primary focus:ring-1 focus:ring-primary/20 rounded-xl px-5 py-4 text-white font-mono placeholder:text-slate-600 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-slate-500 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-sora font-bold text-lg py-5 rounded-full transition-all hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-primary/20" type="submit">
                            Entrar
                        </button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-10 text-center">
<p class="font-sora text-slate-400 text-sm">
                        Novo por aqui? 
                        <a class="text-ghost-white font-semibold hover:underline underline-offset-4 transition-all ml-1" href="#">
